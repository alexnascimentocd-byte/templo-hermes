<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="50%" style="stop-color:#0a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <linearGradient id="gold1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4a547"/>
      <stop offset="100%" style="stop-color:#ffcc00"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="800" fill="url(#bg1)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="rgba(212,165,71,0.05)"/>
  <circle cx="500" cy="700" r="250" fill="rgba(74,138,255,0.05)"/>
  
  <!-- Border frame -->
  <rect x="20" y="20" width="560" height="760" rx="20" fill="none" stroke="rgba(212,165,71,0.3)" stroke-width="2"/>
  
  <!-- Top badge -->
  <rect x="180" y="50" width="240" height="40" rx="20" fill="rgba(212,165,71,0.15)" stroke="rgba(212,165,71,0.4)" stroke-width="1"/>
  <text x="300" y="76" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#d4a547" text-anchor="middle">⚡ MEGA PACK</text>
  
  <!-- Main icon -->
  <text x="300" y="200" font-size="100" text-anchor="middle">📝</text>
  
  <!-- Title -->
  <text x="300" y="290" font-family="Arial, sans-serif" font-size="36" font-weight="900" fill="#ffffff" text-anchor="middle">550+</text>
  <text x="300" y="335" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="url(#gold1)" text-anchor="middle">SCRIPTS E COPIES</text>
  
  <!-- Divider -->
  <line x1="150" y1="365" x2="450" y2="365" stroke="rgba(212,165,71,0.4)" stroke-width="1"/>
  
  <!-- Benefits -->
  <text x="300" y="410" font-family="Arial, sans-serif" font-size="16" fill="#aaa" text-anchor="middle">✅ Scripts para WhatsApp</text>
  <text x="300" y="440" font-family="Arial, sans-serif" font-size="16" fill="#aaa" text-anchor="middle">✅ Copies de Alta Conversão</text>
  <text x="300" y="470" font-family="Arial, sans-serif" font-size="16" fill="#aaa" text-anchor="middle">✅ E-mails de Venda</text>
  <text x="300" y="500" font-family="Arial, sans-serif" font-size="16" fill="#aaa" text-anchor="middle">✅ Textos para Anúncios</text>
  <text x="300" y="530" font-family="Arial, sans-serif" font-size="16" fill="#aaa" text-anchor="middle">✅ Atualizações Vitalícias</text>
  
  <!-- Price box -->
  <rect x="150" y="570" width="300" height="100" rx="12" fill="rgba(0,0,0,0.4)" stroke="rgba(74,255,138,0.3)" stroke-width="2"/>
  <text x="300" y="605" font-family="Arial, sans-serif" font-size="16" fill="#666" text-anchor="middle" text-decoration="line-through">DE R$ 97,00</text>
  <text x="300" y="650" font-family="Arial, sans-serif" font-size="42" font-weight="900" fill="#4aff8a" text-anchor="middle" filter="url(#glow1)">R$ 19,90</text>
  
  <!-- CTA -->
  <rect x="150" y="700" width="300" height="50" rx="10" fill="url(#gold1)"/>
  <text x="300" y="732" font-family="Arial, sans-serif" font-size="18" font-weight="900" fill="#000" text-anchor="middle">COMPRAR AGORA →</text>
  
  <!-- Footer -->
  <text x="300" y="780" font-family="Arial, sans-serif" font-size="11" fill="#444" text-anchor="middle">🏛️ Packs Digitais — Acesso Imediato</text>
</svg>
